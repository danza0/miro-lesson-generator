<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #faf8f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 32px;
      color: #1a1a2e;
    }
    h1 .gradient-text {
      background: linear-gradient(135deg, #f97316, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    body.adults h1 .gradient-text {
      background: linear-gradient(135deg, #0ea5e9, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .toggle-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
    .toggle {
      display: flex; background: #f3f4f6; border-radius: 100px; padding: 4px; gap: 4px;
    }
    .toggle button {
      border: none; padding: 10px 24px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.3s; background: transparent; color: #6b7280;
    }
    .toggle button.active-kids { background: linear-gradient(135deg, #f97316, #a855f7); color: #fff; }
    .toggle button.active-adults { background: linear-gradient(135deg, #0ea5e9, #10b981); color: #fff; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .label-hint { font-weight: 400; color: #9ca3af; }
    input, select, textarea {
      width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      transition: border-color 0.2s; outline: none; background: #fff;
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, select:focus, textarea:focus { border-color: #a855f7; }
    body.adults input:focus, body.adults select:focus, body.adults textarea:focus { border-color: #0ea5e9; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
      color: #fff; cursor: pointer; margin-top: 8px;
      background: linear-gradient(135deg, #f97316, #a855f7); transition: all 0.3s;
    }
    body.adults .btn { background: linear-gradient(135deg, #0ea5e9, #10b981); }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .progress { display: none; margin-top: 24px; }
    .progress.visible { display: block; }
    .step { display: flex; align-items: center; gap: 12px; padding: 10px 0; color: #9ca3af; font-size: 14px; transition: color 0.3s; }
    .step.active { color: #1a1a2e; }
    .step.done { color: #10b981; }
    .step-icon {
      width: 28px; height: 28px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 14px;
      background: #f3f4f6; transition: all 0.3s; flex-shrink: 0;
    }
    .step.active .step-icon {
      background: linear-gradient(135deg, #f97316, #a855f7); color: #fff; animation: pulse 1.2s infinite;
    }
    body.adults .step.active .step-icon { background: linear-gradient(135deg, #0ea5e9, #10b981); }
    .step.done .step-icon { background: #10b981; color: #fff; animation: none; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    .error-box {
      display: none; margin-top: 24px; padding: 16px; background: #fef2f2;
      border-radius: 12px; border: 1px solid #fecaca; color: #991b1b; font-size: 14px; text-align: center;
    }
    .error-box.visible { display: block; }
    footer { text-align: center; margin-top: 32px; font-size: 13px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Generate a <span class="gradient-text">perfect lesson</span></h1>
    <div class="toggle-wrap">
      <div class="toggle">
        <button id="btn-kids" class="active-kids" onclick="setMode('kids')">Kids (9-12)</button>
        <button id="btn-adults" onclick="setMode('adults')">Adults (25+)</button>
      </div>
    </div>
    <div class="form-group">
      <label for="topic">Topic *</label>
      <input type="text" id="topic" placeholder="e.g. Travel, Food, Daily Routine...">
    </div>
    <div class="form-group">
      <label for="grammar">Grammar Focus <span class="label-hint">(optional)</span></label>
      <input type="text" id="grammar" placeholder="e.g. was/were, Present Perfect, Conditionals...">
    </div>
    <div class="form-group">
      <label for="level">Level</label>
      <select id="level">
        <option value="A1 Beginner">A1 Beginner</option>
        <option value="A2 Elementary">A2 Elementary</option>
        <option value="B1 Intermediate" selected>B1 Intermediate</option>
        <option value="B2 Upper-Intermediate">B2 Upper-Intermediate</option>
        <option value="C1 Advanced">C1 Advanced</option>
      </select>
    </div>
    <div class="form-group">
      <label for="age">Student Age</label>
      <input type="text" id="age" placeholder="e.g. 10 or 25-30">
    </div>
    <div class="form-group">
      <label for="youtube">YouTube Videos <span class="label-hint">(optional — paste URLs, one per line)</span></label>
      <textarea id="youtube" placeholder="https://youtube.com/watch?v=...&#10;https://youtu.be/..."></textarea>
    </div>
    <button class="btn" id="generate-btn" onclick="generate()">Generate Lesson</button>
    <div class="progress" id="progress">
      <div class="step" id="step-1"><div class="step-icon">1</div><span>Analyzing topic & grammar...</span></div>
      <div class="step" id="step-2"><div class="step-icon">2</div><span>Creating vocabulary & exercises...</span></div>
      <div class="step" id="step-3"><div class="step-icon">3</div><span>Building interactive lesson...</span></div>
      <div class="step" id="step-4"><div class="step-icon">4</div><span>Finalizing...</span></div>
    </div>
    <div class="error-box" id="error"></div>
    <footer>Made with &hearts; for Ukrainian learners</footer>
  </div>
  <script>
    let lessonType = 'kids';
    function setMode(mode) {
      lessonType = mode;
      document.getElementById('btn-kids').className = mode === 'kids' ? 'active-kids' : '';
      document.getElementById('btn-adults').className = mode === 'adults' ? 'active-adults' : '';
      document.body.className = mode === 'adults' ? 'adults' : '';
    }
    function activateStep(n) {
      for (let i = 1; i <= 4; i++) {
        const el = document.getElementById('step-' + i);
        el.className = i < n ? 'step done' : i === n ? 'step active' : 'step';
        if (i < n) el.querySelector('.step-icon').textContent = '\u2713';
      }
    }
    async function generate() {
      const topic = document.getElementById('topic').value.trim();
      if (!topic) { document.getElementById('topic').focus(); return; }
      const btn = document.getElementById('generate-btn');
      const progress = document.getElementById('progress');
      const error = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      progress.className = 'progress visible';
      error.className = 'error-box';
      for (let i = 1; i <= 4; i++) {
        const el = document.getElementById('step-' + i);
        el.className = 'step';
        el.querySelector('.step-icon').textContent = i;
      }
      activateStep(1);
      const t1 = setTimeout(() => activateStep(2), 3000);
      const t2 = setTimeout(() => activateStep(3), 6000);
      const t3 = setTimeout(() => activateStep(4), 9000);
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic,
            grammarFocus: document.getElementById('grammar').value.trim(),
            level: document.getElementById('level').value,
            studentAge: document.getElementById('age').value.trim(),
            lessonType,
            youtubeUrls: document.getElementById('youtube').value.trim(),
          }),
        });
        clearTimeout(t1); clearTimeout(t2); clearTimeout(t3);
        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.error || 'Generation failed');
        }
        for (let i = 1; i <= 4; i++) {
          const el = document.getElementById('step-' + i);
          el.className = 'step done';
          el.querySelector('.step-icon').textContent = '\u2713';
        }
        const lesson = await res.json();
        // Store lesson data and navigate to lesson page
        sessionStorage.setItem('lesson', JSON.stringify(lesson));
        window.location.href = '/lesson.html';
      } catch (err) {
        clearTimeout(t1); clearTimeout(t2); clearTimeout(t3);
        error.textContent = err.message;
        error.className = 'error-box visible';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Lesson';
      }
    }
  </script>
</body>
</html>
